<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShipStation Webhook Simulator (Live)</title>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/date-fns@2.29.3/index.min.js"></script>
    <style>
        body { font-family: -apple-system, system-ui, sans-serif; background: #f0f2f5; display: flex; justify-content: center; padding: 20px; }
        .container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 450px; }
        h1 { font-size: 20px; margin-top: 0; color: #1a202c; border-bottom: 2px solid #edf2f7; padding-bottom: 15px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-size: 12px; font-weight: 700; color: #4a5568; margin-bottom: 5px; text-transform: uppercase; }
        input, select { width: 100%; padding: 10px; border: 1px solid #e2e8f0; border-radius: 6px; font-size: 14px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #3182ce; color: white; border: none; border-radius: 6px; font-weight: 600; cursor: pointer; margin-top: 10px; }
        button:hover { background: #2b6cb0; }
        button:disabled { background: #cbd5e0; cursor: not-allowed; }
        .history { margin-top: 25px; border-top: 1px solid #edf2f7; padding-top: 15px; }
        .history-item { font-size: 12px; padding: 8px; border-bottom: 1px solid #f7fafc; display: flex; justify-content: space-between; align-items: center; }
        .status-tag { font-size: 10px; padding: 2px 6px; border-radius: 4px; font-weight: bold; }
        .success { background: #c6f6d5; color: #22543d; }
        .error { background: #fed7d7; color: #822727; }
    </style>
</head>
<body>

<div class="container">
    <h1>🚀 Webhook Simulator</h1>
    
    <div class="form-group">
        <label>Target Webhook URL</label>
        <input type="text" id="target_url" placeholder="https://webhook.site/...">
    </div>

    <div class="form-group">
        <label>Tracking Number</label>
        <input type="text" id="tracking_number" value="SHIP-77889900">
    </div>

    <div class="form-group">
        <label>Carrier</label>
        <select id="carrier">
            <option value="fedex">FedEx</option>
            <option value="ups">UPS</option>
            <option value="usps">USPS</option>
        </select>
    </div>

    <div class="form-group">
        <label>Target Status</label>
        <select id="status">
            <option value="AC">Accepted (AC)</option>
            <option value="IT">In Transit (IT)</option>
            <option value="DE" selected>Delivered (DE)</option>
            <option value="EX">Exception (EX)</option>
        </select>
    </div>

    <button id="send-btn" onclick="fireWebhook()">Fire Webhook 🔥</button>

    <div class="history">
        <label>Recent Activity</label>
        <div id="log-list"></div>
    </div>
</div>

<script>
    // FULL PAYLOAD ENGINE - High Fidelity Logic
    const CARRIERS = {
        fedex: {
            events: [
                { description: "Delivered", event_code: "DL", status_code: "DE", hour_offset: 0 },
                { description: "On FedEx vehicle for delivery", event_code: "OD", status_code: "IT", hour_offset: -4 },
                { description: "Arrived at FedEx location", event_code: "AR", status_code: "IT", hour_offset: -12 },
                { description: "Picked up", event_code: "PU", status_code: "AC", hour_offset: -24 }
            ]
        },
        ups: {
            events: [
                { description: "Delivered", event_code: "D", carrier_detail_code: "FS", status_code: "DE", hour_offset: 0 },
                { description: "Out For Delivery", event_code: "I", carrier_detail_code: "OT", status_code: "IT", hour_offset: -6 },
                { description: "Shipped", event_code: "M", carrier_detail_code: "MP", status_code: "AC", hour_offset: -36 }
            ]
        },
        usps: {
            events: [
                { description: "Delivered, In/At Mailbox", event_code: "01", status_code: "DE", hour_offset: 0 },
                { description: "Out for Delivery", event_code: "OF", status_code: "IT", hour_offset: -5 },
                { description: "Arrived at Post Office", event_code: "AR", status_code: "IT", hour_offset: -10 },
                { description: "Accepted at USPS Facility", event_code: "OA", status_code: "AC", hour_offset: -48 }
            ]
        }
    };

    let log = [];

    async function fireWebhook() {
        const btn = document.getElementById('send-btn');
        const config = {
            url: document.getElementById('target_url').value,
            carrier: document.getElementById('carrier').value,
            tracking: document.getElementById('tracking_number').value,
            status: document.getElementById('status').value
        };

        if (!config.url) return alert("Please provide a destination URL.");

        btn.disabled = true;
        const now = new Date();
        const carrierData = CARRIERS[config.carrier];
        
        // Find the starting point in the timeline
        const startIndex = carrierData.events.findIndex(e => e.status_code === config.status);
        const historyEvents = carrierData.events.slice(startIndex);
        const refOffset = historyEvents[0].hour_offset;

        // Process dynamic timestamps
        const processedEvents = historyEvents.map(ev => {
            const diff = Math.abs(ev.hour_offset - refOffset);
            const time = dateFns.subHours(now, diff);
            return {
                ...ev,
                occurred_at: dateFns.formatISO(time),
                carrier_occurred_at: dateFns.formatISO(time).split('Z')[0]
            };
        });

        const payload = {
            resource_url: `https://api.shipengine.com/v1/tracking?carrier_code=${config.carrier}&tracking_number=${config.tracking}`,
            resource_type: "API_TRACK",
            data: {
                tracking_number: config.tracking,
                status_code: config.status,
                status_description: processedEvents[0].description,
                carrier_status_code: processedEvents[0].event_code,
                carrier_status_description: processedEvents[0].description,
                carrier_detail_code: processedEvents[0].carrier_detail_code || null,
                ship_date: dateFns.formatISO(dateFns.subHours(now, 72)),
                actual_delivery_date: config.status === 'DE' ? dateFns.formatISO(now) : null,
                events: processedEvents
            }
        };

        try {
            await axios.post(config.url, payload);
            addLog(config, true);
        } catch (err) {
            console.error(err);
            addLog(config, false);
            alert("Sent! (Note: If Webhook.site doesn't show it, you may need a CORS extension enabled in your browser for local testing).");
        } finally {
            btn.disabled = false;
        }
    }

    function addLog(c, success) {
        log.unshift({ time: new Date().toLocaleTimeString(), ...c, success });
        if (log.length > 5) log.pop();
        document.getElementById('log-list').innerHTML = log.map(l => `
            <div class="history-item">
                <span><strong>${l.time}</strong> ${l.carrier.toUpperCase()} [${l.status}]</span>
                <span class="status-tag ${l.success ? 'success' : 'error'}">${l.success ? 'SENT' : 'ERR'}</span>
            </div>
        `).join('');
    }
</script>
</body>
</html>
